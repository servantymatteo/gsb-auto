---
- name: Installer et configurer GLPI sur le container
  hosts: all
  become: yes

  vars:
    glpi_version: "10.0.16"
    glpi_download_url: "https://github.com/glpi-project/glpi/releases/download/{{ glpi_version }}/glpi-{{ glpi_version }}.tgz"
    glpi_db_name: "glpidb"
    glpi_db_user: "glpi_user"
    glpi_db_password: "glpi_password"

  tasks:
    - name: Mettre à jour le cache apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Installer les dépendances (Apache, PHP, MariaDB)
      apt:
        name:
          - apache2
          - mariadb-server
          - php
          - php-mysql
          - php-mbstring
          - php-curl
          - php-gd
          - php-xml
          - php-intl
          - php-ldap
          - php-zip
          - php-bz2
          - php-cli
          - php-apcu
          - php-imap
          - python3-pymysql
          - sudo
          - wget
          - tar
        state: present

    - name: Activer les modules Apache nécessaires
      apache2_module:
        name: "{{ item }}"
        state: present
      loop:
        - rewrite
        - headers
      notify: Restart Apache

    - name: Démarrer et activer Apache
      systemd:
        name: apache2
        state: started
        enabled: yes

    - name: Démarrer et activer MariaDB
      systemd:
        name: mariadb
        state: started
        enabled: yes

    - name: Créer la base de données GLPI
      community.mysql.mysql_db:
        name: "{{ glpi_db_name }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Créer l'utilisateur MySQL pour GLPI
      community.mysql.mysql_user:
        name: "{{ glpi_db_user }}"
        password: "{{ glpi_db_password }}"
        priv: "{{ glpi_db_name }}.*:ALL"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Vérifier si GLPI est déjà téléchargé
      stat:
        path: "/tmp/glpi-{{ glpi_version }}.tgz"
      register: glpi_archive

    - name: Télécharger GLPI
      get_url:
        url: "{{ glpi_download_url }}"
        dest: "/tmp/glpi-{{ glpi_version }}.tgz"
      when: not glpi_archive.stat.exists

    - name: Vérifier si GLPI est déjà extrait
      stat:
        path: /var/www/html/glpi
      register: glpi_dir

    - name: Extraire GLPI dans /var/www/html
      unarchive:
        src: "/tmp/glpi-{{ glpi_version }}.tgz"
        dest: /var/www/html
        remote_src: yes
      when: not glpi_dir.stat.exists

    - name: Définir les permissions sur le dossier GLPI
      file:
        path: /var/www/html/glpi
        owner: www-data
        group: www-data
        recurse: yes

    - name: Vérifier si GLPI est déjà installé
      stat:
        path: /var/www/html/glpi/config/config_db.php
      register: glpi_installed

    - name: Installer GLPI via la ligne de commande
      command: >
        php bin/console db:install
        --db-host=localhost
        --db-name={{ glpi_db_name }}
        --db-user={{ glpi_db_user }}
        --db-password={{ glpi_db_password }}
        --no-interaction
        --force
      args:
        chdir: /var/www/html/glpi
      become_user: www-data
      when: not glpi_installed.stat.exists

    - name: Supprimer le fichier d'installation
      file:
        path: /var/www/html/glpi/install/install.php
        state: absent

    - name: Créer une page de redirection vers GLPI
      copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <meta http-equiv="refresh" content="0; url=/glpi" />
              <title>Redirection vers GLPI</title>
          </head>
          <body>
              <p>Redirection vers <a href="/glpi">GLPI</a>...</p>
          </body>
          </html>
        dest: /var/www/html/index.html

    - name: Créer un MOTD personnalisé
      copy:
        content: |
          #!/bin/bash
          GREEN='\033[0;32m'
          BLUE='\033[0;34m'
          CYAN='\033[0;36m'
          YELLOW='\033[1;33m'
          BOLD='\033[1m'
          NC='\033[0m'
          HOSTNAME=$(hostname)
          IP=$(hostname -I | awk '{print $1}')
          UPTIME=$(uptime -p | sed 's/up //')
          OS=$(lsb_release -d | cut -f2)
          KERNEL=$(uname -r)
          CPU=$(nproc)
          MEM_TOTAL=$(free -h | awk '/^Mem:/ {print $2}')
          MEM_USED=$(free -h | awk '/^Mem:/ {print $3}')
          DISK_USED=$(df -h / | awk 'NR==2 {print $5}')
          echo ""
          echo -e "${BOLD}${GREEN}╔═══════════════════════════════════════════════════════╗${NC}"
          echo -e "${BOLD}${GREEN}║            🎯 SERVEUR GLPI - PROXMOX LXC             ║${NC}"
          echo -e "${BOLD}${GREEN}╚═══════════════════════════════════════════════════════╝${NC}"
          echo ""
          echo -e "${CYAN}📊 Informations système :${NC}"
          echo -e "${BOLD}┌───────────────────────────────────────────────────────┐${NC}"
          echo -e "${BOLD}│${NC} 🖥️  Hostname    : ${YELLOW}${HOSTNAME}${NC}"
          echo -e "${BOLD}│${NC} 🌐 IP          : ${YELLOW}${IP}${NC}"
          echo -e "${BOLD}│${NC} ⏱  Uptime      : ${YELLOW}${UPTIME}${NC}"
          echo -e "${BOLD}│${NC} 💻 OS          : ${YELLOW}${OS}${NC}"
          echo -e "${BOLD}│${NC} 🔧 Kernel      : ${YELLOW}${KERNEL}${NC}"
          echo -e "${BOLD}└───────────────────────────────────────────────────────┘${NC}"
          echo ""
          echo -e "${CYAN}💾 Ressources :${NC}"
          echo -e "${BOLD}┌───────────────────────────────────────────────────────┐${NC}"
          echo -e "${BOLD}│${NC} CPU          : ${YELLOW}${CPU} cores${NC}"
          echo -e "${BOLD}│${NC} RAM          : ${YELLOW}${MEM_USED} / ${MEM_TOTAL}${NC}"
          echo -e "${BOLD}│${NC} Disque       : ${YELLOW}${DISK_USED} utilisé${NC}"
          echo -e "${BOLD}└───────────────────────────────────────────────────────┘${NC}"
          echo ""
          echo -e "${BLUE}🌐 Accès GLPI : ${BOLD}http://${IP}/glpi${NC}"
          echo -e "${CYAN}👤 Compte admin : ${YELLOW}glpi / glpi${NC}"
          echo ""
        dest: /etc/update-motd.d/99-custom-motd
        mode: '0755'

    - name: Afficher les informations de connexion
      debug:
        msg: |
          ╔════════════════════════════════════════════════╗
          ║         GLPI INSTALLÉ ET CONFIGURÉ ! ✓         ║
          ╚════════════════════════════════════════════════╝

          🌐 URL d'accès: http://{{ ansible_default_ipv4.address }}/glpi

          📝 Identifiants par défaut :
          ┌────────────────────────────────────────────────┐
          │ 👤 Admin     : glpi / glpi                     │
          │ 🔧 Tech      : tech / tech                     │
          │ 👥 Normal    : normal / normal                 │
          │ 📮 Post-only : post-only / postonly            │
          └────────────────────────────────────────────────┘

          🔐 Base de données MySQL :
          ┌────────────────────────────────────────────────┐
          │ Nom         : {{ glpi_db_name }}               │
          │ Utilisateur : {{ glpi_db_user }}               │
          └────────────────────────────────────────────────┘

          ⚠️  IMPORTANT : Changez les mots de passe par défaut !

  handlers:
    - name: Restart Apache
      systemd:
        name: apache2
        state: restarted
