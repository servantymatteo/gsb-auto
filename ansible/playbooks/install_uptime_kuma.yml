---
- name: Installer Uptime Kuma
  hosts: all
  become: true

  vars:
    uptime_kuma_version: "1.23.13"
    uptime_kuma_port: 3001
    uptime_kuma_user: "uptime-kuma"
    uptime_kuma_dir: "/opt/uptime-kuma"

  tasks:
    - name: Mettre à jour le cache apt
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Installer les dépendances
      apt:
        name: [curl, git, sudo]
        state: present

    - name: Ajouter le dépôt Node.js 20.x
      shell: curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Installer Node.js
      apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Créer l'utilisateur uptime-kuma
      user:
        name: "{{ uptime_kuma_user }}"
        shell: /bin/bash
        home: "{{ uptime_kuma_dir }}"
        create_home: false
        system: true

    - name: Supprimer le répertoire existant
      file:
        path: "{{ uptime_kuma_dir }}"
        state: absent

    - name: Cloner Uptime Kuma
      git:
        repo: https://github.com/louislam/uptime-kuma.git
        dest: "{{ uptime_kuma_dir }}"
        version: "{{ uptime_kuma_version }}"

    - name: Définir les permissions
      file:
        path: "{{ uptime_kuma_dir }}"
        owner: "{{ uptime_kuma_user }}"
        group: "{{ uptime_kuma_user }}"
        recurse: true

    - name: Installer les dépendances npm
      npm:
        path: "{{ uptime_kuma_dir }}"
        state: present
      become_user: "{{ uptime_kuma_user }}"

    - name: Build Uptime Kuma
      shell: npm run setup
      args:
        chdir: "{{ uptime_kuma_dir }}"
      become_user: "{{ uptime_kuma_user }}"

    - name: Créer le service systemd
      copy:
        dest: /etc/systemd/system/uptime-kuma.service
        mode: '0644'
        content: |
          [Unit]
          Description=Uptime Kuma
          After=network.target

          [Service]
          Type=simple
          User={{ uptime_kuma_user }}
          WorkingDirectory={{ uptime_kuma_dir }}
          ExecStart=/usr/bin/node server/server.js
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target

    - name: Recharger systemd et démarrer Kuma
      systemd:
        name: uptime-kuma
        state: started
        enabled: true
        daemon_reload: true

    - name: Attendre que Kuma soit prêt sur le port {{ uptime_kuma_port }}
      wait_for:
        port: "{{ uptime_kuma_port }}"
        delay: 5
        timeout: 120

    - name: Ouvrir le port firewall (si UFW actif)
      ufw:
        rule: allow
        port: "{{ uptime_kuma_port }}"
        proto: tcp
      ignore_errors: true
