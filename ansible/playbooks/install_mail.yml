---
- name: Installer le serveur mail (Postfix + Dovecot + SnappyMail)
  hosts: all
  become: true

  vars:
    mail_domain: "gsb.local"
    mail_admin_user: "admin"
    mail_admin_password: "Formation13@"
    snappymail_dir: "/var/www/snappymail"

  tasks:
    - name: Mettre à jour le cache apt
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Pré-configurer Postfix
      debconf:
        name: postfix
        question: "{{ item.question }}"
        value: "{{ item.value }}"
        vtype: "{{ item.vtype }}"
      loop:
        - { question: "postfix/mailname",        value: "{{ mail_domain }}", vtype: "string" }
        - { question: "postfix/main_mailer_type", value: "Internet Site",    vtype: "select" }

    - name: Installer les paquets
      apt:
        name:
          - postfix
          - dovecot-core
          - dovecot-imapd
          - apache2
          - php
          - php-curl
          - php-json
          - php-xml
          - php-zip
          - php-mbstring
          - php-gnupg
          - libapache2-mod-php
          - curl
          - unzip
        state: present

    - name: Configurer Postfix
      copy:
        dest: /etc/postfix/main.cf
        content: |
          smtpd_banner = $myhostname ESMTP
          biff = no
          append_dot_mydomain = no
          myhostname = mail.{{ mail_domain }}
          mydomain = {{ mail_domain }}
          myorigin = $mydomain
          mydestination = $myhostname, localhost.$mydomain, localhost, $mydomain
          relayhost =
          mynetworks = 127.0.0.0/8 [::ffff:127.0.0.0]/104 [::1]/128
          home_mailbox = Maildir/
          inet_interfaces = all
          inet_protocols = all

    - name: Configurer Dovecot — plaintext auth
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#?disable_plaintext_auth'
        line: 'disable_plaintext_auth = no'

    - name: Configurer Dovecot — mécanismes auth
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#?auth_mechanisms'
        line: 'auth_mechanisms = plain login'

    - name: Configurer Dovecot — strip domaine du login
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#?auth_username_format'
        line: 'auth_username_format = %n'

    - name: Configurer Dovecot — maildir
      lineinfile:
        path: /etc/dovecot/conf.d/10-mail.conf
        regexp: '^#?mail_location'
        line: 'mail_location = maildir:~/Maildir'

    - name: Créer le compte utilisateur mail
      user:
        name: "{{ mail_admin_user }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: Définir le mot de passe
      shell: echo "{{ mail_admin_user }}:{{ mail_admin_password }}" | chpasswd

    - name: Créer le Maildir
      file:
        path: "/home/{{ mail_admin_user }}/Maildir"
        state: directory
        owner: "{{ mail_admin_user }}"
        group: "{{ mail_admin_user }}"
        mode: '0700'

    - name: Générer le hash du mot de passe Dovecot
      shell: "doveadm pw -s SHA512-CRYPT -p '{{ mail_admin_password }}'"
      register: dovecot_password_hash
      changed_when: false

    - name: Créer le fichier passwd Dovecot
      copy:
        dest: /etc/dovecot/users
        content: "{{ mail_admin_user }}:{{ dovecot_password_hash.stdout }}\n"
        owner: root
        group: dovecot
        mode: '0640'

    - name: Créer l'auth passdb passwd-file pour Dovecot
      copy:
        dest: /etc/dovecot/conf.d/auth-passwdfile.conf.ext
        content: |
          passdb {
            driver = passwd-file
            args = scheme=SHA512-CRYPT /etc/dovecot/users
          }
          userdb {
            driver = passwd
          }
        owner: root
        group: dovecot
        mode: '0640'

    - name: Désactiver l'auth PAM système de Dovecot
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^!include auth-system\.conf\.ext'
        line: '#!include auth-system.conf.ext'

    - name: Activer l'auth passwd-file de Dovecot
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#!include auth-passwdfile\.conf\.ext'
        line: '!include auth-passwdfile.conf.ext'

    - name: Récupérer la dernière version de SnappyMail
      shell: |
        curl -s https://api.github.com/repos/the-djmaze/snappymail/releases/latest \
          | grep "browser_download_url.*snappymail-.*\.zip" \
          | grep -v "demo\|asc" \
          | head -1 \
          | cut -d '"' -f 4
      register: snappymail_url
      changed_when: false

    - name: Créer le répertoire SnappyMail
      file:
        path: "{{ snappymail_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Télécharger et extraire SnappyMail
      shell: |
        curl -fsSL "{{ snappymail_url.stdout }}" -o /tmp/snappymail.zip
        unzip -q -o /tmp/snappymail.zip -d "{{ snappymail_dir }}"
        chown -R www-data:www-data "{{ snappymail_dir }}"
        rm /tmp/snappymail.zip
      args:
        executable: /bin/bash

    - name: Créer les répertoires de config SnappyMail
      file:
        path: "{{ item }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0750'
      loop:
        - "{{ snappymail_dir }}/data/_data_/_default_/configs"
        - "{{ snappymail_dir }}/data/_data_/_default_/domains"

    - name: Générer le hash du mot de passe admin SnappyMail
      shell: php -r "echo password_hash('{{ mail_admin_password }}', PASSWORD_BCRYPT);"
      register: snappymail_admin_hash
      changed_when: false

    - name: Configurer SnappyMail (application.ini)
      copy:
        dest: "{{ snappymail_dir }}/data/_data_/_default_/configs/application.ini"
        owner: www-data
        group: www-data
        mode: '0640'
        content: |
          [webmail]
          title = "SnappyMail GSB"
          loading_description = "GSB"
          app_path = "/"
          app_index_as_plain_text = Off

          [login]
          default_domain = "{{ mail_domain }}"
          allow_languages_on_settings = On

          [security]
          admin_password = "{{ snappymail_admin_hash.stdout }}"
          admin_panel_host = ""
          allow_two_factor_auth = Off
          csrf_protection = On

          [logs]
          enable = On
          write_on_error_only = On
          filename = "{date:Y-m-d}.log"

          [cache]
          enable = On
          system = "files"
          http = 3600
          server = 43200

          [version]
          current = "2.0"

    - name: Configurer le domaine IMAP/SMTP SnappyMail
      copy:
        dest: "{{ snappymail_dir }}/data/_data_/_default_/domains/default.json"
        owner: www-data
        group: www-data
        mode: '0640'
        content: |
          {
            "imap": {
              "host": "localhost",
              "port": 143,
              "secure": 0,
              "shortLogin": false,
              "useAuth": true,
              "setLogins": true,
              "disabled": false
            },
            "smtp": {
              "host": "localhost",
              "port": 25,
              "secure": 0,
              "shortLogin": false,
              "useAuth": false,
              "setLogins": false,
              "phpMail": false,
              "disabled": false
            },
            "sieve": { "allow": false },
            "white": 0,
            "enabled": true
          }

    - name: Configurer Apache pour SnappyMail
      copy:
        dest: /etc/apache2/sites-available/snappymail.conf
        content: |
          <VirtualHost *:80>
            ServerName mail.{{ mail_domain }}
            DocumentRoot {{ snappymail_dir }}
            DirectoryIndex index.php

            <Directory {{ snappymail_dir }}>
              Options -Indexes +FollowSymLinks
              AllowOverride All
              Require all granted
            </Directory>

            Alias /webmail {{ snappymail_dir }}
            Alias /mail    {{ snappymail_dir }}

            ErrorLog ${APACHE_LOG_DIR}/snappymail-error.log
            CustomLog ${APACHE_LOG_DIR}/snappymail-access.log combined
          </VirtualHost>

    - name: Désactiver le site Apache par défaut
      command: a2dissite 000-default
      args:
        removes: /etc/apache2/sites-enabled/000-default.conf
      ignore_errors: true

    - name: Activer le site SnappyMail
      command: a2ensite snappymail
      args:
        creates: /etc/apache2/sites-enabled/snappymail.conf

    - name: Activer mod_rewrite
      apache2_module:
        name: rewrite
        state: present

    - name: Démarrer et activer les services
      systemd:
        name: "{{ item }}"
        state: restarted
        enabled: true
        daemon_reload: true
      loop:
        - postfix
        - dovecot
        - apache2

    - name: Ouvrir les ports firewall
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: ['25', '143', '587', '80']
      ignore_errors: true

    - name: Résumé
      debug:
        msg:
          - "Serveur mail opérationnel"
          - "Domaine : {{ mail_domain }}"
          - "Webmail : http://{{ ansible_default_ipv4.address }}"
          - "Compte  : {{ mail_admin_user }}@{{ mail_domain }} / {{ mail_admin_password }}"
          - "Admin SnappyMail : http://{{ ansible_default_ipv4.address }}/?admin"
