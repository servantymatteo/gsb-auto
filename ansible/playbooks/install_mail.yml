---
- name: Installer le serveur mail (Postfix + Dovecot + Roundcube)
  hosts: all
  become: true

  vars:
    mail_domain: "gsb.local"
    mail_admin_user: "admin"
    mail_admin_password: "Formation13@"
    roundcube_des_key: "GSBMailRoundcubeKey123"

  tasks:

    # ── Mise à jour ───────────────────────────────────────────────────────────
    - name: Mettre à jour le cache apt
      apt:
        update_cache: true
        cache_valid_time: 3600

    # ── Pré-configuration des paquets interactifs ─────────────────────────────
    - name: Pré-configurer Postfix
      debconf:
        name: postfix
        question: "{{ item.question }}"
        value: "{{ item.value }}"
        vtype: "{{ item.vtype }}"
      loop:
        - { question: "postfix/mailname",        value: "{{ mail_domain }}", vtype: "string" }
        - { question: "postfix/main_mailer_type", value: "Internet Site",    vtype: "select" }

    - name: Pré-configurer Roundcube (SQLite, sans mot de passe DB)
      debconf:
        name: roundcube-core
        question: "{{ item.question }}"
        value: "{{ item.value }}"
        vtype: "{{ item.vtype }}"
      loop:
        - { question: "roundcube/dbconfig-install", value: "true",    vtype: "boolean" }
        - { question: "roundcube/database-type",    value: "sqlite3", vtype: "select"  }

    # ── Installation ──────────────────────────────────────────────────────────
    - name: Installer les paquets
      apt:
        name:
          - postfix
          - dovecot-core
          - dovecot-imapd
          - apache2
          - php
          - php-curl
          - php-json
          - php-xml
          - php-zip
          - php-mbstring
          - php-intl
          - libapache2-mod-php
          - roundcube
          - roundcube-core
          - roundcube-sqlite3
          - sqlite3
        state: present

    # ── Postfix ───────────────────────────────────────────────────────────────
    - name: Configurer Postfix
      copy:
        dest: /etc/postfix/main.cf
        content: |
          smtpd_banner = $myhostname ESMTP
          biff = no
          append_dot_mydomain = no
          myhostname = mail.{{ mail_domain }}
          mydomain = {{ mail_domain }}
          myorigin = $mydomain
          mydestination = $myhostname, localhost.$mydomain, localhost, $mydomain
          relayhost =
          mynetworks = 127.0.0.0/8 [::ffff:127.0.0.0]/104 [::1]/128
          home_mailbox = Maildir/
          inet_interfaces = all
          inet_protocols = all

    # ── Dovecot — authentification ────────────────────────────────────────────
    - name: Dovecot — autoriser auth en clair (pas de TLS obligatoire)
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#?disable_plaintext_auth'
        line: 'disable_plaintext_auth = no'

    - name: Dovecot — mécanismes PLAIN et LOGIN
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#?auth_mechanisms'
        line: 'auth_mechanisms = plain login'

    - name: Dovecot — strip le @domaine du login (admin@gsb.local → admin)
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#?auth_username_format'
        line: 'auth_username_format = %Ln'

    - name: Dovecot — désactiver l'auth PAM système
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^!include auth-system\.conf\.ext'
        line: '#!include auth-system.conf.ext'

    - name: Dovecot — activer l'auth par fichier passwd
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#!include auth-passwdfile\.conf\.ext'
        line: '!include auth-passwdfile.conf.ext'

    - name: Dovecot — emplacement des mails (Maildir)
      lineinfile:
        path: /etc/dovecot/conf.d/10-mail.conf
        regexp: '^#?mail_location'
        line: 'mail_location = maildir:~/Maildir'

    # ── Utilisateur système + Maildir ─────────────────────────────────────────
    - name: Créer l'utilisateur mail
      user:
        name: "{{ mail_admin_user }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: Créer le Maildir
      file:
        path: "/home/{{ mail_admin_user }}/Maildir"
        state: directory
        owner: "{{ mail_admin_user }}"
        group: "{{ mail_admin_user }}"
        mode: '0700'

    # ── Dovecot — fichier passwd (plus fiable que PAM) ────────────────────────
    - name: Générer le hash du mot de passe Dovecot
      shell: "doveadm pw -s SHA512-CRYPT -p '{{ mail_admin_password }}'"
      register: dovecot_pw
      changed_when: false

    - name: Créer /etc/dovecot/users
      copy:
        dest: /etc/dovecot/users
        content: "{{ mail_admin_user }}:{{ dovecot_pw.stdout }}\n"
        owner: root
        group: dovecot
        mode: '0640'

    - name: Configurer le driver passdb/userdb pour Dovecot
      copy:
        dest: /etc/dovecot/conf.d/auth-passwdfile.conf.ext
        owner: root
        group: dovecot
        mode: '0640'
        content: |
          passdb {
            driver = passwd-file
            args = scheme=SHA512-CRYPT /etc/dovecot/users
          }
          userdb {
            driver = passwd
          }

    # ── Roundcube — configuration principale ──────────────────────────────────
    - name: Configurer Roundcube
      copy:
        dest: /etc/roundcube/config.inc.php
        owner: www-data
        group: www-data
        mode: '0640'
        content: |
          <?php
          $config = [];

          // Base de données SQLite
          $config['db_dsnw'] = 'sqlite:////var/lib/roundcube/roundcube.db?mode=0640';

          // Serveur IMAP (Dovecot local)
          $config['imap_host'] = 'localhost';
          $config['imap_port'] = 143;
          $config['imap_auth_type'] = 'PLAIN';

          // Serveur SMTP (Postfix local, sans auth)
          $config['smtp_host'] = 'localhost';
          $config['smtp_port'] = 25;
          $config['smtp_user'] = '';
          $config['smtp_pass'] = '';
          $config['smtp_auth_type'] = '';

          // Domaine : Roundcube strip @gsb.local avant d'envoyer à Dovecot
          // Permet de se connecter avec "admin" ou "admin@gsb.local"
          $config['username_domain'] = '{{ mail_domain }}';

          // Apparence
          $config['product_name'] = 'GSB Webmail';
          $config['skin'] = 'elastic';
          $config['language'] = 'fr_FR';

          // Clé de chiffrement (fixe pour éviter les perfs de session)
          $config['des_key'] = '{{ roundcube_des_key }}';

          // Plugins
          $config['plugins'] = ['archive', 'zipdownload'];

    # ── Roundcube — base SQLite ───────────────────────────────────────────────
    - name: Initialiser la base SQLite Roundcube si absente
      shell: |
        if [ ! -f /var/lib/roundcube/roundcube.db ]; then
          sqlite3 /var/lib/roundcube/roundcube.db \
            < /usr/share/roundcube/SQL/sqlite.initial.sql
        fi
        chown www-data:www-data /var/lib/roundcube/roundcube.db
        chmod 0640 /var/lib/roundcube/roundcube.db
      args:
        executable: /bin/bash

    # ── Apache ────────────────────────────────────────────────────────────────
    - name: Désactiver le site Apache par défaut
      command: a2dissite 000-default
      args:
        removes: /etc/apache2/sites-enabled/000-default.conf
      ignore_errors: true

    - name: Trouver le répertoire web Roundcube
      shell: |
        # Chercher index.php de roundcube dans les chemins Debian classiques
        for d in /var/lib/roundcube/public_html /usr/share/roundcube; do
          [ -f "$d/index.php" ] && echo "$d" && exit 0
        done
        # Fallback : recherche large
        find /var /usr/share -maxdepth 4 -name "index.php" \
          -path "*roundcube*" 2>/dev/null | head -1 | xargs dirname
      register: rc_webroot
      changed_when: false

    - name: Configurer Apache pour Roundcube (à la racine /)
      copy:
        dest: /etc/apache2/sites-available/webmail.conf
        content: |
          <VirtualHost *:80>
            ServerName mail.{{ mail_domain }}
            DocumentRoot {{ rc_webroot.stdout }}
            DirectoryIndex index.php

            <Directory {{ rc_webroot.stdout }}>
              Options -Indexes +FollowSymLinks
              AllowOverride All
              Require all granted
            </Directory>

            Alias /webmail {{ rc_webroot.stdout }}
            Alias /mail    {{ rc_webroot.stdout }}

            ErrorLog  ${APACHE_LOG_DIR}/webmail-error.log
            CustomLog ${APACHE_LOG_DIR}/webmail-access.log combined
          </VirtualHost>

    - name: Activer le site webmail
      command: a2ensite webmail
      args:
        creates: /etc/apache2/sites-enabled/webmail.conf

    - name: Activer mod_rewrite
      apache2_module:
        name: rewrite
        state: present

    # ── Démarrage des services ────────────────────────────────────────────────
    - name: Démarrer et activer les services
      systemd:
        name: "{{ item }}"
        state: restarted
        enabled: true
        daemon_reload: true
      loop:
        - postfix
        - dovecot
        - apache2

    # ── Firewall ──────────────────────────────────────────────────────────────
    - name: Ouvrir les ports (SMTP 25, IMAP 143, Submission 587, HTTP 80)
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: ['25', '143', '587', '80']
      ignore_errors: true

    # ── Résumé ────────────────────────────────────────────────────────────────
    - name: Résumé
      debug:
        msg:
          - "Serveur mail opérationnel"
          - "Domaine : {{ mail_domain }}"
          - "Webmail : http://{{ ansible_default_ipv4.address }}/"
          - "Login   : {{ mail_admin_user }}  OU  {{ mail_admin_user }}@{{ mail_domain }}"
          - "Mot de passe : {{ mail_admin_password }}"
