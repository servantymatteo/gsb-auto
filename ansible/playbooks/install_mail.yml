---
- name: Installer le serveur mail (Postfix + Dovecot + Roundcube)
  hosts: all
  become: true

  vars:
    mail_domain: "gsb.local"
    mail_admin_user: "admin"
    mail_admin_password: "Formation13@"
    mail_hostname: "{{ ansible_hostname }}"

  tasks:
    - name: Mettre à jour le cache apt
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Pré-configurer Postfix (évite les prompts interactifs)
      debconf:
        name: postfix
        question: "{{ item.question }}"
        value: "{{ item.value }}"
        vtype: "{{ item.vtype }}"
      loop:
        - { question: "postfix/mailname",        value: "{{ mail_domain }}", vtype: "string" }
        - { question: "postfix/main_mailer_type", value: "Internet Site",    vtype: "select" }

    - name: Installer Postfix, Dovecot et Roundcube
      apt:
        name:
          - postfix
          - dovecot-core
          - dovecot-imapd
          - dovecot-pop3d
          - roundcube
          - roundcube-core
          - roundcube-sqlite3
          - apache2
          - libapache2-mod-php
          - php-mbstring
          - php-intl
          - php-net-smtp
        state: present

    - name: Configurer Postfix — main.cf
      copy:
        dest: /etc/postfix/main.cf
        content: |
          smtpd_banner = $myhostname ESMTP
          biff = no
          append_dot_mydomain = no
          readme_directory = no

          myhostname = {{ mail_hostname }}.{{ mail_domain }}
          mydomain = {{ mail_domain }}
          myorigin = $mydomain
          mydestination = $myhostname, localhost.$mydomain, localhost, $mydomain
          relayhost =
          mynetworks = 127.0.0.0/8 [::ffff:127.0.0.0]/104 [::1]/128
          mailbox_size_limit = 0
          recipient_delimiter = +
          inet_interfaces = all
          inet_protocols = all

          home_mailbox = Maildir/
          mailbox_command =
          smtpd_sasl_type = dovecot
          smtpd_sasl_path = private/auth
          smtpd_sasl_auth_enable = yes
          smtpd_recipient_restrictions = permit_mynetworks, permit_sasl_authenticated, reject_unauth_destination

    - name: Configurer Dovecot — désactiver auth plaintext
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#?disable_plaintext_auth'
        line: 'disable_plaintext_auth = no'

    - name: Configurer Dovecot — mécanismes auth
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#?auth_mechanisms'
        line: 'auth_mechanisms = plain login'

    - name: Configurer Dovecot — emplacement maildir
      lineinfile:
        path: /etc/dovecot/conf.d/10-mail.conf
        regexp: '^#?mail_location'
        line: 'mail_location = maildir:~/Maildir'

    - name: Configurer Dovecot — socket SASL pour Postfix
      copy:
        dest: /etc/dovecot/conf.d/99-postfix-auth.conf
        content: |
          service auth {
            unix_listener /var/spool/postfix/private/auth {
              mode = 0660
              user = postfix
              group = postfix
            }
          }

    - name: Créer le compte admin mail
      user:
        name: "{{ mail_admin_user }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: Définir le mot de passe (chpasswd — fiable pour PAM)
      shell: echo "{{ mail_admin_user }}:{{ mail_admin_password }}" | chpasswd

    - name: Créer le dossier Maildir pour l'admin
      file:
        path: "/home/{{ mail_admin_user }}/Maildir"
        state: directory
        owner: "{{ mail_admin_user }}"
        group: "{{ mail_admin_user }}"
        mode: '0700'

    - name: Créer la config PAM Dovecot
      copy:
        dest: /etc/pam.d/dovecot
        content: |
          @include common-auth
          @include common-account

    - name: Configurer Roundcube
      copy:
        dest: /etc/roundcube/config.inc.php
        content: |
          <?php
          $config['db_dsnw'] = 'sqlite:////var/lib/roundcube/db/sqlite.db';
          $config['default_host'] = 'localhost';
          $config['default_port'] = 143;
          $config['smtp_server'] = 'localhost';
          $config['smtp_port'] = 25;
          $config['smtp_user'] = '%u';
          $config['smtp_pass'] = '%p';
          $config['product_name'] = 'GSB Webmail';
          $config['des_key'] = 'gsb_auto_roundcube_key24';
          $config['plugins'] = ['archive', 'zipdownload'];
          $config['language'] = 'fr_FR';
          $config['username_domain'] = '{{ mail_domain }}';
          $config['mail_domain'] = '{{ mail_domain }}';
          $config['support_url'] = '';
          $config['skin'] = 'elastic';

    - name: Créer le dossier DB Roundcube
      file:
        path: /var/lib/roundcube/db
        state: directory
        owner: www-data
        group: www-data
        mode: '0750'

    - name: Initialiser la base SQLite Roundcube
      shell: |
        php /usr/share/roundcube/bin/initdb.sh --dir /usr/share/roundcube/SQL 2>/dev/null || true
        if [ ! -f /var/lib/roundcube/db/sqlite.db ]; then
          sqlite3 /var/lib/roundcube/db/sqlite.db < /usr/share/roundcube/SQL/sqlite.initial.sql
        fi
        chown www-data:www-data /var/lib/roundcube/db/sqlite.db
        chmod 640 /var/lib/roundcube/db/sqlite.db
      args:
        executable: /bin/bash

    - name: Trouver le répertoire web Roundcube
      shell: find /usr/share/roundcube /var/lib/roundcube -name "index.php" -maxdepth 3 2>/dev/null | head -1 | xargs dirname
      register: roundcube_webroot
      changed_when: false

    - name: Écrire la config Apache Roundcube
      copy:
        dest: /etc/apache2/conf-available/roundcube-gsb.conf
        content: |
          Alias /roundcube {{ roundcube_webroot.stdout }}
          Alias /webmail   {{ roundcube_webroot.stdout }}

          <Directory {{ roundcube_webroot.stdout }}>
            Options -FollowSymLinks
            AllowOverride All
            Require all granted
            DirectoryIndex index.php
          </Directory>

    - name: Activer la config Roundcube
      command: a2enconf roundcube-gsb
      args:
        creates: /etc/apache2/conf-enabled/roundcube-gsb.conf

    - name: Activer modules Apache
      apache2_module:
        name: "{{ item }}"
        state: present
      loop: [rewrite, php8.2]
      ignore_errors: true

    - name: Démarrer et activer les services
      systemd:
        name: "{{ item }}"
        state: restarted
        enabled: true
        daemon_reload: true
      loop:
        - postfix
        - dovecot
        - apache2

    - name: Ouvrir les ports firewall (si UFW actif)
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: ['25', '143', '587', '993', '80']
      ignore_errors: true

    - name: Résumé
      debug:
        msg:
          - "Serveur mail opérationnel"
          - "Domaine  : {{ mail_domain }}"
          - "SMTP     : {{ ansible_default_ipv4.address }}:25"
          - "IMAP     : {{ ansible_default_ipv4.address }}:143"
          - "Webmail  : http://{{ ansible_default_ipv4.address }}/roundcube"
          - "Compte   : {{ mail_admin_user }}@{{ mail_domain }}"
