---
- name: Installer le serveur mail (Postfix + Dovecot + SnappyMail)
  hosts: all
  become: true

  vars:
    mail_domain: "gsb.local"
    mail_admin_user: "admin"
    mail_admin_password: "Formation13@"
    snappymail_dir: "/var/www/snappymail"

  tasks:

    # ── Système ───────────────────────────────────────────────────────────────
    - name: Mettre à jour le cache apt
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Pré-configurer Postfix (non-interactif)
      debconf:
        name: postfix
        question: "{{ item.question }}"
        value: "{{ item.value }}"
        vtype: "{{ item.vtype }}"
      loop:
        - { question: "postfix/mailname",        value: "{{ mail_domain }}", vtype: "string" }
        - { question: "postfix/main_mailer_type", value: "Internet Site",    vtype: "select" }

    - name: Installer les paquets
      apt:
        name:
          - postfix
          - dovecot-core
          - dovecot-imapd
          - apache2
          - php
          - php-curl
          - php-json
          - php-xml
          - php-zip
          - php-mbstring
          - php-gnupg
          - libapache2-mod-php
          - curl
          - unzip
        state: present

    # ── Postfix ───────────────────────────────────────────────────────────────
    - name: Configurer Postfix
      copy:
        dest: /etc/postfix/main.cf
        content: |
          smtpd_banner = $myhostname ESMTP
          biff = no
          append_dot_mydomain = no
          myhostname = mail.{{ mail_domain }}
          mydomain = {{ mail_domain }}
          myorigin = $mydomain
          mydestination = $myhostname, localhost.$mydomain, localhost, $mydomain
          relayhost =
          mynetworks = 127.0.0.0/8 [::ffff:127.0.0.0]/104 [::1]/128
          home_mailbox = Maildir/
          inet_interfaces = all
          inet_protocols = all

    # ── Dovecot — auth via fichier passwd (plus fiable que PAM) ───────────────
    - name: Dovecot — autoriser auth en clair (pas de TLS requis)
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#?disable_plaintext_auth'
        line: 'disable_plaintext_auth = no'

    - name: Dovecot — mécanismes PLAIN + LOGIN
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#?auth_mechanisms'
        line: 'auth_mechanisms = plain login'

    - name: Dovecot — strip @domaine du login (admin@gsb.local → admin)
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#?auth_username_format'
        line: 'auth_username_format = %Ln'

    - name: Dovecot — désactiver auth PAM système
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^!include auth-system\.conf\.ext'
        line: '#!include auth-system.conf.ext'

    - name: Dovecot — activer auth passwd-file
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#!include auth-passwdfile\.conf\.ext'
        line: '!include auth-passwdfile.conf.ext'

    - name: Dovecot — emplacement des mails (Maildir)
      lineinfile:
        path: /etc/dovecot/conf.d/10-mail.conf
        regexp: '^#?mail_location'
        line: 'mail_location = maildir:~/Maildir'

    # ── Utilisateur système + Maildir ─────────────────────────────────────────
    - name: Créer l'utilisateur mail
      user:
        name: "{{ mail_admin_user }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: Créer le répertoire Maildir
      file:
        path: "/home/{{ mail_admin_user }}/Maildir"
        state: directory
        owner: "{{ mail_admin_user }}"
        group: "{{ mail_admin_user }}"
        mode: '0700'

    - name: Générer le hash du mot de passe Dovecot
      shell: "doveadm pw -s SHA512-CRYPT -p '{{ mail_admin_password }}'"
      register: dovecot_pw
      changed_when: false

    - name: Créer /etc/dovecot/users (passwd-file)
      copy:
        dest: /etc/dovecot/users
        content: "{{ mail_admin_user }}:{{ dovecot_pw.stdout }}\n"
        owner: root
        group: dovecot
        mode: '0640'

    - name: Créer auth-passwdfile.conf.ext
      copy:
        dest: /etc/dovecot/conf.d/auth-passwdfile.conf.ext
        owner: root
        group: dovecot
        mode: '0640'
        content: |
          passdb {
            driver = passwd-file
            args = scheme=SHA512-CRYPT /etc/dovecot/users
          }
          userdb {
            driver = passwd
          }

    # ── SnappyMail — téléchargement ───────────────────────────────────────────
    - name: Récupérer l'URL de la dernière version SnappyMail
      shell: |
        curl -s https://api.github.com/repos/the-djmaze/snappymail/releases/latest \
          | grep "browser_download_url.*snappymail-.*\.zip" \
          | grep -v "demo\|asc" \
          | head -1 \
          | cut -d '"' -f 4
      register: snappymail_url
      changed_when: false

    - name: Créer le répertoire d'installation
      file:
        path: "{{ snappymail_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Télécharger et extraire SnappyMail
      shell: |
        curl -fsSL "{{ snappymail_url.stdout }}" -o /tmp/snappymail.zip
        unzip -q -o /tmp/snappymail.zip -d "{{ snappymail_dir }}"
        chown -R www-data:www-data "{{ snappymail_dir }}"
        rm -f /tmp/snappymail.zip
      args:
        executable: /bin/bash

    # ── Apache ────────────────────────────────────────────────────────────────
    - name: Désactiver le site par défaut Apache
      command: a2dissite 000-default
      args:
        removes: /etc/apache2/sites-enabled/000-default.conf
      ignore_errors: true

    - name: Configurer le VirtualHost SnappyMail
      copy:
        dest: /etc/apache2/sites-available/snappymail.conf
        content: |
          <VirtualHost *:80>
            ServerName mail.{{ mail_domain }}
            DocumentRoot {{ snappymail_dir }}
            DirectoryIndex index.php

            <Directory {{ snappymail_dir }}>
              Options -Indexes +FollowSymLinks
              AllowOverride All
              Require all granted
            </Directory>

            ErrorLog  ${APACHE_LOG_DIR}/snappymail-error.log
            CustomLog ${APACHE_LOG_DIR}/snappymail-access.log combined
          </VirtualHost>

    - name: Activer le site SnappyMail
      command: a2ensite snappymail
      args:
        creates: /etc/apache2/sites-enabled/snappymail.conf

    - name: Activer mod_rewrite
      apache2_module:
        name: rewrite
        state: present

    # ── Initialisation SnappyMail ─────────────────────────────────────────────
    # Apache doit tourner AVANT qu'on écrive la config, pour que SnappyMail
    # crée lui-même son répertoire data/ au premier accès.

    - name: Démarrer Apache pour initialiser SnappyMail
      systemd:
        name: apache2
        state: started
        enabled: true
        daemon_reload: true

    - name: Démarrer Postfix et Dovecot
      systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - postfix
        - dovecot

    - name: Déclencher l'initialisation SnappyMail (premier accès HTTP)
      uri:
        url: "http://127.0.0.1/"
        method: GET
        status_code: [200, 301, 302, 404, 500]
        timeout: 20
      ignore_errors: true

    - name: Attendre la création du répertoire data/_data_
      wait_for:
        path: "{{ snappymail_dir }}/data/_data_"
        timeout: 30
      ignore_errors: true

    # ── Configuration SnappyMail ──────────────────────────────────────────────
    - name: Créer les répertoires de configuration
      file:
        path: "{{ item }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0750'
      loop:
        - "{{ snappymail_dir }}/data/_data_/_default_/configs"
        - "{{ snappymail_dir }}/data/_data_/_default_/domains"

    - name: Générer le hash admin SnappyMail (bcrypt)
      shell: php -r "echo password_hash('{{ mail_admin_password }}', PASSWORD_BCRYPT);"
      register: sm_admin_hash
      changed_when: false

    - name: Écrire application.ini
      copy:
        dest: "{{ snappymail_dir }}/data/_data_/_default_/configs/application.ini"
        owner: www-data
        group: www-data
        mode: '0640'
        content: |
          [webmail]
          title = "GSB Webmail"
          loading_description = "GSB"
          app_path = "/"
          app_index_as_plain_text = Off

          [login]
          default_domain = "{{ mail_domain }}"
          allow_languages_on_settings = On

          [security]
          admin_password = "{{ sm_admin_hash.stdout }}"
          admin_panel_host = ""
          allow_two_factor_auth = Off
          csrf_protection = On

          [logs]
          enable = On
          write_on_error_only = On
          filename = "{date:Y-m-d}.log"

          [cache]
          enable = On
          system = "files"
          http = 3600
          server = 43200

          [version]
          current = "2.0"

    # IMPORTANT : SnappyMail v2 sérialise ses objets en PascalCase.
    # Le fichier de domaine DOIT utiliser des clés PascalCase (Host, Port…)
    # sinon SnappyMail ne peut pas désérialiser et répond "domain not configured".
    - name: Écrire la config du domaine {{ mail_domain }}
      copy:
        dest: "{{ snappymail_dir }}/data/_data_/_default_/domains/{{ mail_domain }}.json"
        owner: www-data
        group: www-data
        mode: '0640'
        content: |
          {
            "IMAP": {
              "host": "localhost",
              "port": 143,
              "secure": "",
              "shortLogin": false,
              "useAuth": true,
              "setLogins": true,
              "disabled": false
            },
            "SMTP": {
              "host": "localhost",
              "port": 25,
              "secure": "",
              "shortLogin": false,
              "useAuth": false,
              "setLogins": false,
              "phpMail": false,
              "disabled": false
            },
            "Sieve": {
              "allow": false,
              "host": "",
              "port": 4190,
              "secure": "",
              "shortLogin": false,
              "useAuth": false,
              "setLogins": false
            },
            "white": 0,
            "Enabled": true,
            "AliasesForDisplayName": ""
          }

    - name: Corriger les permissions du répertoire data
      file:
        path: "{{ snappymail_dir }}/data"
        owner: www-data
        group: www-data
        recurse: true

    # ── Redémarrage final ─────────────────────────────────────────────────────
    - name: Redémarrer tous les services
      systemd:
        name: "{{ item }}"
        state: restarted
        enabled: true
      loop:
        - postfix
        - dovecot
        - apache2

    # ── Firewall ──────────────────────────────────────────────────────────────
    - name: Ouvrir les ports firewall
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: ['25', '143', '587', '80']
      ignore_errors: true

    # ── Résumé ────────────────────────────────────────────────────────────────
    - name: Résumé
      debug:
        msg:
          - "========================================="
          - "Serveur mail opérationnel"
          - "Webmail     : http://{{ ansible_default_ipv4.address }}/"
          - "Login       : {{ mail_admin_user }}@{{ mail_domain }}"
          - "Mot de passe: {{ mail_admin_password }}"
          - "Admin panel : http://{{ ansible_default_ipv4.address }}/?admin"
          - "Admin mdp   : {{ mail_admin_password }}"
          - "========================================="
