---
# PLAYBOOK ANSIBLE - Installation d'Apache
# Un playbook = une liste de "plays" (tâches à exécuter)

- name: Installer et configurer Apache sur le container
  # "name" = description de ce que fait ce play

  hosts: all
  # "hosts: all" = exécute sur tous les hôtes dans l'inventaire
  # Terraform passera l'IP du container créé comme inventaire

  become: true
  # "become: yes" = utilise sudo (exécute en tant que root)
  # Nécessaire pour installer des paquets

  tasks:
    # "tasks" = liste des tâches à exécuter dans l'ordre

    - name: S'assurer que SSH est installé et actif
      # Première tâche : vérifier que SSH fonctionne
      apt:
        # Module "apt" = gère les paquets Debian/Ubuntu
        name: openssh-server
        # Nom du paquet à installer
        state: present
        # "present" = s'assurer que le paquet est installé
        # Si déjà installé, ne fait rien

    - name: Mettre à jour le cache apt
      # Équivalent de : apt-get update
      apt:
        update_cache: yes
        # Télécharge la liste des paquets disponibles
        cache_valid_time: 3600
        # Cache valide pendant 3600 secondes (1h)
        # Si mis à jour il y a moins d'1h, ne refait pas l'update

    - name: Installer Apache2
      # Installation du serveur web Apache
      apt:
        name: apache2
        # Nom du paquet Apache
        state: present
        # S'assurer qu'il est installé

    - name: Démarrer et activer Apache
      # Démarre Apache maintenant ET au démarrage du système
      systemd:
        # Module "systemd" = gère les services systemd
        name: apache2
        # Nom du service
        state: started
        # "started" = démarre le service s'il n'est pas démarré
        enabled: yes
        # "enabled: yes" = démarre automatiquement au boot

    - name: Créer une page d'accueil personnalisée
      copy:
        content: |
          <!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>GSB — {{ ansible_hostname }}</title>
            <style>
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                background: #0f1117;
                color: #e2e8f0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
              }

              .card {
                background: #1a1d27;
                border: 1px solid #2d3148;
                border-radius: 16px;
                padding: 48px 56px;
                max-width: 560px;
                width: 90%;
                box-shadow: 0 24px 64px rgba(0,0,0,0.4);
              }

              .badge {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: #1e3a5f;
                color: #60a5fa;
                border: 1px solid #2563eb44;
                border-radius: 20px;
                padding: 4px 12px;
                font-size: 12px;
                font-weight: 600;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                margin-bottom: 24px;
              }

              .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #22c55e;
                animation: pulse 2s infinite;
              }

              @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.4; }
              }

              h1 {
                font-size: 28px;
                font-weight: 700;
                color: #f8fafc;
                margin-bottom: 8px;
                letter-spacing: -0.02em;
              }

              .subtitle {
                color: #64748b;
                font-size: 14px;
                margin-bottom: 36px;
              }

              .info-grid {
                display: grid;
                gap: 12px;
                margin-bottom: 36px;
              }

              .info-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                background: #0f1117;
                border: 1px solid #1e2235;
                border-radius: 10px;
                padding: 12px 16px;
              }

              .info-label {
                font-size: 12px;
                font-weight: 500;
                color: #475569;
                text-transform: uppercase;
                letter-spacing: 0.06em;
              }

              .info-value {
                font-size: 14px;
                font-weight: 600;
                color: #cbd5e1;
                font-family: 'SF Mono', 'Fira Code', monospace;
              }

              .info-value.ip {
                color: #60a5fa;
              }

              .footer {
                display: flex;
                align-items: center;
                gap: 8px;
                padding-top: 24px;
                border-top: 1px solid #1e2235;
                font-size: 12px;
                color: #334155;
              }

              .footer strong {
                color: #475569;
              }
            </style>
          </head>
          <body>
            <div class="card">
              <div class="badge">
                <span class="dot"></span>
                En ligne
              </div>
              <h1>Serveur Web GSB</h1>
              <p class="subtitle">Serveur Apache — provisionné automatiquement</p>

              <div class="info-grid">
                <div class="info-row">
                  <span class="info-label">Hostname</span>
                  <span class="info-value">{{ ansible_hostname }}</span>
                </div>
                <div class="info-row">
                  <span class="info-label">Adresse IP</span>
                  <span class="info-value ip">{{ ansible_default_ipv4.address }}</span>
                </div>
                <div class="info-row">
                  <span class="info-label">Système</span>
                  <span class="info-value">{{ ansible_distribution }} {{ ansible_distribution_version }}</span>
                </div>
                <div class="info-row">
                  <span class="info-label">Noyau</span>
                  <span class="info-value">{{ ansible_kernel }}</span>
                </div>
              </div>

              <div class="footer">
                Deploye avec <strong>Terraform</strong> + <strong>Ansible</strong> via gsb-auto
              </div>
            </div>
          </body>
          </html>
        dest: /var/www/html/index.html

    - name: Ouvrir le port 80 dans le firewall (si UFW actif)
      ufw:
        rule: allow
        port: '80'
        proto: tcp
      ignore_errors: true

    - name: Créer un MOTD personnalisé
      copy:
        content: |
          #!/bin/bash

          # Couleurs
          GREEN='\033[0;32m'
          BLUE='\033[0;34m'
          CYAN='\033[0;36m'
          YELLOW='\033[1;33m'
          BOLD='\033[1m'
          NC='\033[0m'

          # Récupérer les informations
          HOSTNAME=$(hostname)
          IP=$(hostname -I | awk '{print $1}')
          UPTIME=$(uptime -p | sed 's/up //')
          OS=$(lsb_release -d | cut -f2)
          KERNEL=$(uname -r)
          CPU=$(nproc)
          MEM_TOTAL=$(free -h | awk '/^Mem:/ {print $2}')
          MEM_USED=$(free -h | awk '/^Mem:/ {print $3}')
          DISK_USED=$(df -h / | awk 'NR==2 {print $5}')

          echo ""
          echo -e "${BOLD}${GREEN}╔═══════════════════════════════════════════════════════╗${NC}"
          echo -e "${BOLD}${GREEN}║           🚀 SERVEUR APACHE - PROXMOX LXC            ║${NC}"
          echo -e "${BOLD}${GREEN}╚═══════════════════════════════════════════════════════╝${NC}"
          echo ""
          echo -e "${CYAN}📊 Informations système :${NC}"
          echo -e "${BOLD}┌───────────────────────────────────────────────────────┐${NC}"
          echo -e "${BOLD}│${NC} 🖥️  Hostname    : ${YELLOW}${HOSTNAME}${NC}"
          echo -e "${BOLD}│${NC} 🌐 IP          : ${YELLOW}${IP}${NC}"
          echo -e "${BOLD}│${NC} ⏱  Uptime      : ${YELLOW}${UPTIME}${NC}"
          echo -e "${BOLD}│${NC} 💻 OS          : ${YELLOW}${OS}${NC}"
          echo -e "${BOLD}│${NC} 🔧 Kernel      : ${YELLOW}${KERNEL}${NC}"
          echo -e "${BOLD}└───────────────────────────────────────────────────────┘${NC}"
          echo ""
          echo -e "${CYAN}💾 Ressources :${NC}"
          echo -e "${BOLD}┌───────────────────────────────────────────────────────┐${NC}"
          echo -e "${BOLD}│${NC} CPU          : ${YELLOW}${CPU} cores${NC}"
          echo -e "${BOLD}│${NC} RAM          : ${YELLOW}${MEM_USED} / ${MEM_TOTAL}${NC}"
          echo -e "${BOLD}│${NC} Disque       : ${YELLOW}${DISK_USED} utilisé${NC}"
          echo -e "${BOLD}└───────────────────────────────────────────────────────┘${NC}"
          echo ""
          echo -e "${BLUE}🌐 Accès web : ${BOLD}http://${IP}${NC}"
          echo ""
        dest: /etc/update-motd.d/99-custom-motd
        mode: '0755'

    - name: Vérifier le statut d'Apache
      # Vérifie qu'Apache fonctionne correctement
      systemd:
        name: apache2
        state: started
      register: apache_status
      # "register" = sauvegarde le résultat dans une variable

    - name: Afficher les informations de connexion
      debug:
        msg: |
          ╔════════════════════════════════════════════════╗
          ║         APACHE INSTALLÉ ET CONFIGURÉ ! ✓       ║
          ╚════════════════════════════════════════════════╝

          🌐 URL d'accès: http://{{ ansible_default_ipv4.address }}

          📋 Informations du serveur :
          ┌─────────────────────────────────────────┐
          │ Hostname  : {{ ansible_hostname }}
          │ IP        : {{ ansible_default_ipv4.address }}
          │ OS        : {{ ansible_distribution }} {{ ansible_distribution_version }}
          │ Statut    : {{ 'Actif ✓' if apache_status.status.ActiveState == 'active' else 'Inactif ✗' }}
          └─────────────────────────────────────────┘

          💡 Page personnalisée créée automatiquement
