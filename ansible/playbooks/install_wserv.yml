---
- name: Configurer Windows Server (WinRM + IIS + AD DS)
  hosts: all
  gather_facts: no

  vars:
    ad_domain_name: "{{ ad_domain_name | default('gsb.local') }}"
    ad_domain_netbios: "{{ ad_domain_netbios | default('GSB') }}"
    ad_safe_mode_password: "{{ ad_safe_mode_password | default('Formation13@') }}"
    ad_ou_list: "{{ ad_ou_list | default('') }}"
    ad_group_list: "{{ ad_group_list | default('') }}"
    ad_user_list: "{{ ad_user_list | default('') }}"
    ad_default_user_password: "{{ ad_default_user_password | default('Formation13@') }}"

  tasks:
    - name: Activer WinRM (idempotent)
      ansible.windows.win_powershell:
        script: |
          winrm quickconfig -q
          Set-Item -Path WSMan:\localhost\Service\AllowUnencrypted -Value $true
          Set-Item -Path WSMan:\localhost\Service\Auth\Basic -Value $true
          netsh advfirewall firewall add rule name="WinRM 5985" dir=in action=allow protocol=TCP localport=5985 | Out-Null

    - name: Attendre reconnexion WinRM après reconfig
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 60

    - name: Installer IIS
      ansible.windows.win_feature:
        name: Web-Server
        include_management_tools: true
        state: present

    - name: Déployer page d'accueil IIS
      ansible.windows.win_copy:
        dest: C:\inetpub\wwwroot\index.html
        content: |
          <!DOCTYPE html>
          <html>
          <head><title>Windows Server - GSB</title></head>
          <body>
            <h1>Windows Server déployé automatiquement</h1>
            <p>Domaine AD: {{ ad_domain_name }} ({{ ad_domain_netbios }})</p>
            <p>Provisionné avec Terraform + Ansible</p>
          </body>
          </html>

    - name: Installer AD DS + DNS
      ansible.windows.win_feature:
        name:
          - AD-Domain-Services
          - DNS
        include_management_tools: true
        state: present
      register: ad_features

    - name: Promouvoir en contrôleur de domaine si nécessaire
      ansible.windows.win_powershell:
        script: |
          $domain = "{{ ad_domain_name }}"
          $netbios = "{{ ad_domain_netbios }}"
          $pwd = ConvertTo-SecureString "{{ ad_safe_mode_password }}" -AsPlainText -Force
          try {
            Get-ADDomain -Identity $domain | Out-Null
            Write-Output "ALREADY_DOMAIN"
          } catch {
            Install-ADDSForest `
              -DomainName $domain `
              -DomainNetbiosName $netbios `
              -InstallDNS `
              -SafeModeAdministratorPassword $pwd `
              -Force `
              -NoRebootOnCompletion:$true
            Write-Output "PROMOTED"
          }
      register: ad_promote

    - name: Reboot après promotion AD
      ansible.windows.win_reboot:
        reboot_timeout: 3600
        post_reboot_delay: 60
      when: >
        ('PROMOTED' in (ad_promote.output | default([]) | join(' ')))
        or ('PROMOTED' in (ad_promote.host_out | default('')))
        or ('PROMOTED' in (ad_promote.stdout | default('')))

    - name: Vérifier service IIS
      ansible.windows.win_service:
        name: W3SVC
        state: started

    - name: Créer OU, groupes et utilisateurs AD (optionnel)
      ansible.windows.win_powershell:
        script: |
          Import-Module ActiveDirectory

          $domain = "{{ ad_domain_name }}"
          $ouCsv = "{{ ad_ou_list }}"
          $groupCsv = "{{ ad_group_list }}"
          $userCsv = "{{ ad_user_list }}"
          $userPwd = "{{ ad_default_user_password }}"
          $usersContainer = "CN=Users"

          $dn = ($domain.Split('.') | ForEach-Object { "DC=$_" }) -join ','
          $securePassword = ConvertTo-SecureString $userPwd -AsPlainText -Force

          function Parse-CsvList {
            param([string]$Raw)
            if ([string]::IsNullOrWhiteSpace($Raw)) { return @() }
            return $Raw.Split(',') | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
          }

          $ous = Parse-CsvList -Raw $ouCsv
          $groups = Parse-CsvList -Raw $groupCsv
          $users = Parse-CsvList -Raw $userCsv

          foreach ($ou in $ous) {
            $ouDn = "OU=$ou,$dn"
            if (-not (Get-ADOrganizationalUnit -Identity $ouDn -ErrorAction SilentlyContinue)) {
              New-ADOrganizationalUnit -Name $ou -Path $dn -ProtectedFromAccidentalDeletion:$false | Out-Null
            }
          }

          foreach ($grp in $groups) {
            $grpDn = "CN=$grp,$usersContainer,$dn"
            if (-not (Get-ADGroup -Identity $grpDn -ErrorAction SilentlyContinue)) {
              New-ADGroup -Name $grp -SamAccountName $grp -GroupScope Global -GroupCategory Security -Path "$usersContainer,$dn" | Out-Null
            }
          }

          foreach ($usr in $users) {
            $usrDn = "CN=$usr,$usersContainer,$dn"
            if (-not (Get-ADUser -Identity $usrDn -ErrorAction SilentlyContinue)) {
              New-ADUser `
                -Name $usr `
                -SamAccountName $usr `
                -UserPrincipalName "$usr@$domain" `
                -Path "$usersContainer,$dn" `
                -AccountPassword $securePassword `
                -Enabled $true `
                -ChangePasswordAtLogon $false | Out-Null
            }
          }

    - name: Résumé final Windows
      ansible.builtin.debug:
        msg:
          - "Windows Server configuré"
          - "IIS: OK"
          - "AD DS: {{ ad_domain_name }} ({{ ad_domain_netbios }})"
          - "OU créées: {{ ad_ou_list | default('aucune') }}"
          - "Groupes créés: {{ ad_group_list | default('aucun') }}"
          - "Users créés: {{ ad_user_list | default('aucun') }}"
